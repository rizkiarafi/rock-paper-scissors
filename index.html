<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <h2 id="round-count">Choose your handsign!</h2>
    <div id="buttons-container">
      <button id="rock">Rock</button>
      <button id="paper">Paper</button>
      <button id="scissors">Scissors</button>
    </div>
    <p id="choice-info" style="display: none">
      <span id="human-choice"></span> vs <span id="bot-choice"></span>
      <b id="round-result"></b>
    </p>
    <p id="score-container">
      Human score: <span id="human-score">0</span> || Bot score:
      <span id="bot-score">0</span>
    </p>
    <div id="final-result"></div>
  </body>
</html>
